<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتب سليماني — لوحة التحكم</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#F8FAFC; --surf:#FFFFFF; --pri:#1E3A8A; --pri2:#2563EB;
    --txt:#1E293B; --txt2:#64748B; --txt3:#94A3B8; --bdr:#E2E8F0;
    --ok:#059669; --err:#DC2626; --acc:#F59E0B; --indigo:#6366F1; --tag:#EFF6FF;
  }
  body { font-family:'Segoe UI',Tahoma,sans-serif; background:var(--bg); color:var(--txt); direction:rtl; }
  .topbar { background:linear-gradient(135deg,var(--pri),var(--pri2)); color:white;
    padding:14px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:30; }
  .topbar .menu-btn { font-size:22px; cursor:pointer; background:none; border:none; color:white; padding:4px 8px; }
  .topbar h1 { font-size:18px; font-weight:700; flex:1; }
  .topbar .live { font-size:11px; opacity:0.85; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:40; display:none; }
  .overlay.open { display:block; }
  .sidebar { position:fixed; top:0; right:0; width:260px; height:100%; background:var(--surf);
    z-index:50; transform:translateX(100%); transition:transform 0.25s ease; overflow-y:auto;
    box-shadow:-4px 0 20px rgba(0,0,0,0.1); }
  .sidebar.open { transform:translateX(0); }
  .sidebar .sb-head { background:linear-gradient(135deg,var(--pri),var(--pri2)); color:white; padding:24px 20px; text-align:center; }
  .sidebar .sb-head .logo { font-size:34px; }
  .sidebar .sb-head .t { font-size:16px; font-weight:700; margin-top:6px; }
  .sidebar .sb-head .s { font-size:10px; opacity:0.8; }
  .nav-item { display:flex; align-items:center; gap:12px; padding:14px 18px; cursor:pointer;
    font-size:14px; font-weight:700; color:var(--txt); border-right:3px solid transparent; }
  .nav-item .ico { width:26px; text-align:center; font-size:17px; }
  .nav-item:hover { background:var(--bg); }
  .nav-item.active { background:var(--tag); color:var(--pri); border-right-color:var(--pri); }
  .period-row { display:flex; background:var(--surf); border-bottom:1px solid var(--bdr); overflow-x:auto; position:sticky; top:54px; z-index:20; }
  .period-btn { flex:1; min-width:58px; padding:10px 4px; text-align:center; font-size:13px; font-weight:700;
    border:none; background:none; cursor:pointer; color:var(--txt2); white-space:nowrap; }
  .period-btn.active { color:white; background:var(--pri); border-radius:8px; margin:4px 3px; }
  .content { padding:12px; max-width:760px; margin:0 auto; }
  .hero { background:linear-gradient(135deg,var(--pri),var(--pri2)); color:white; border-radius:16px; padding:20px; margin-bottom:14px; }
  .hero .lbl { font-size:12px; opacity:0.8; }
  .hero .val { font-size:32px; font-weight:800; margin:6px 0; }
  .hero .sub { display:flex; font-size:12px; opacity:0.8; gap:14px; flex-wrap:wrap; }
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .card { background:var(--surf); border-radius:12px; padding:14px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .card .stripe { width:24px; height:3px; border-radius:3px; margin-bottom:8px; }
  .card .lbl { font-size:10px; color:var(--txt2); margin-bottom:4px; }
  .card .val { font-size:16px; font-weight:800; }
  .card .sub { font-size:10px; font-weight:700; margin-top:2px; }
  .section-title { display:flex; align-items:center; gap:8px; margin:20px 0 10px; font-size:14px; font-weight:700; }
  .section-title .dot { width:4px; height:18px; background:var(--pri); border-radius:3px; }
  .tbl-wrap { background:var(--surf); border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.06); margin-bottom:14px; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  thead th { background:var(--pri); color:white; padding:10px 6px; font-weight:700; font-size:11px; text-align:center; white-space:nowrap; }
  tbody td { padding:9px 6px; text-align:center; border-bottom:1px solid #EEF2F6; white-space:nowrap; }
  tbody tr:nth-child(even) { background:#FAFBFC; }
  tbody tr:last-child td { border-bottom:none; }
  .t-amt { font-weight:800; color:var(--acc); }
  .t-name { font-weight:700; color:var(--txt); }
  .t-grn { color:var(--ok); font-weight:700; }
  .t-blu { color:var(--pri2); font-weight:700; }
  .t-red { color:var(--err); font-weight:700; }
  .t-mut { color:var(--txt3); }
  .tbl-foot { display:flex; justify-content:space-between; padding:12px 14px; background:var(--tag); font-weight:800; }
  .tbl-foot .l { color:var(--pri); } .tbl-foot .v { color:var(--acc); }
  .warn-box { background:#FEE2E2; border-radius:10px; padding:10px 14px; margin-bottom:10px; color:var(--err); font-size:13px; font-weight:700; }
  .empty { text-align:center; padding:40px 20px; color:var(--txt3); font-size:14px; }
  .loading { text-align:center; padding:60px 20px; color:var(--txt3); font-size:14px; }
  .spinner { width:32px; height:32px; border:3px solid var(--bdr); border-top-color:var(--pri); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .last-update { text-align:center; font-size:11px; color:var(--txt3); padding:10px; }
  .pend { display:inline-block; font-size:9px; background:var(--acc); color:white; padding:1px 6px; border-radius:8px; margin-right:4px; }
</style>
</head>
<body>

<div class="topbar">
  <button class="menu-btn" onclick="toggleMenu(true)">☰</button>
  <h1 id="pageTitle">الملخص</h1>
  <span class="live" id="liveDate"></span>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="logo">🌟</div>
    <div class="t">مكتب سليماني</div>
    <div class="s">لوحة التحكم</div>
  </div>
  <div class="nav-item active" data-tab="summary"   onclick="setTab('summary')"><span class="ico">📊</span> الملخص</div>
  <div class="nav-item" data-tab="storage"   onclick="setTab('storage')"><span class="ico">🏪</span> المخزن</div>
  <div class="nav-item" data-tab="sales"     onclick="setTab('sales')"><span class="ico">🛒</span> المبيعات</div>
  <div class="nav-item" data-tab="purchases" onclick="setTab('purchases')"><span class="ico">📦</span> المشتريات</div>
  <div class="nav-item" data-tab="jard"      onclick="setTab('jard')"><span class="ico">📋</span> الجرد</div>
  <div class="nav-item" data-tab="transfer"  onclick="setTab('transfer')"><span class="ico">🔄</span> النقل</div>
  <div class="nav-item" data-tab="debts"     onclick="setTab('debts')"><span class="ico">💳</span> الديون</div>
</div>

<div class="period-row" id="periodRow">
  <button class="period-btn active" onclick="setPeriod(0)">اليوم</button>
  <button class="period-btn" onclick="setPeriod(1)">أمس</button>
  <button class="period-btn" onclick="setPeriod(2)">أسبوع</button>
  <button class="period-btn" onclick="setPeriod(3)">شهر</button>
  <button class="period-btn" onclick="setPeriod(4)">الكل</button>
</div>

<div class="content" id="content">
  <div class="loading"><div class="spinner"></div>جاري تحميل البيانات...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { databaseURL: "https://nayarvip-2c129-default-rtdb.firebaseio.com" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let allSales=[], allPayments=[], allStorage=[], allPurchases=[], allInvLog=[], allTransfer=[], allArchive=[];
let loaded=0; const NEED=127;
let selPeriod=0, curTab='summary';
const PERIODS=["اليوم","أمس","أسبوع","شهر","الكل"];

function getRange(p){
  const now=Date.now(); const d=new Date(); d.setHours(0,0,0,0);
  const t=d.getTime();
  if(p===0) return [t,now];
  if(p===1) return [t-86400000,t-1];
  if(p===2){ d.setDate(d.getDate()-7); return [d.getTime(),now]; }
  if(p===3){ d.setMonth(d.getMonth()-1); return [d.getTime(),now]; }
  return [0,now];
}
function fmt(n){ return new Intl.NumberFormat('ar-SA').format(Math.round(n||0)); }
function ts(o){ return o.lastModified||o.timestamp||0; }
function inRange(o,s,e){ const t=ts(o); return t>=s&&t<=e; }
function qtyLabel(ctn,pcs,ppc){
  ctn=ctn||0; pcs=pcs||0; ppc=ppc||0;
  if(ppc>0 && pcs>=ppc){ ctn+=Math.floor(pcs/ppc); pcs=pcs%ppc; }
  if(ctn>0&&pcs>0) return ctn+'/'+pcs;
  if(ctn>0) return 'ك '+ctn;
  if(pcs>0) return 'ق '+pcs;
  return '—';
}

window.toggleMenu=function(open){
  document.getElementById('sidebar').classList.toggle('open',open);
  document.getElementById('overlay').classList.toggle('open',open);
}
window.setTab=function(tab){
  curTab=tab;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.tab===tab));
  const titles={summary:'الملخص',storage:'المخزن',sales:'المبيعات',purchases:'المشتريات',jard:'الجرد',transfer:'النقل',debts:'الديون'};
  document.getElementById('pageTitle').textContent=titles[tab];
  const showPeriod = (tab==='summary'||tab==='sales'||tab==='purchases'||tab==='jard'||tab==='transfer');
  document.getElementById('periodRow').style.display = showPeriod?'flex':'none';
  toggleMenu(false);
  render();
}
window.setPeriod=function(idx){
  selPeriod=idx;
  document.querySelectorAll('.period-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  render();
}

function render(){
  if((loaded&NEED)!==NEED) return;
  const c=document.getElementById('content');
  let html='';
  if(curTab==='summary')        html=renderSummary();
  else if(curTab==='storage')   html=renderStorage();
  else if(curTab==='sales')     html=renderSales();
  else if(curTab==='purchases') html=renderPurchases();
  else if(curTab==='jard')      html=renderJard();
  else if(curTab==='transfer')  html=renderTransfer();
  else if(curTab==='debts')     html=renderDebts();
  html+='<div class="last-update">آخر تحديث: '+new Date().toLocaleTimeString('ar')+'</div>';
  c.innerHTML=html;
}

function renderSummary(){
  const [s,e]=getRange(selPeriod);
  const sales=allSales.filter(x=>inRange(x,s,e));
  let total=0,cash=0,credit=0,maxSale=0; const clients=new Set(); const byItem={},byClient={};
  for(const x of sales){
    const tp=x.totalPrice||0; total+=tp; if(tp>maxSale)maxSale=tp;
    if(x.paymentType==='نقد') cash+=tp; else credit+=tp;
    const cn=x.clientName||'زبون'; clients.add(cn); byClient[cn]=(byClient[cn]||0)+tp;
    const it=x.itemType; if(!it) continue;
    if(!byItem[it]) byItem[it]={amt:0,ctn:0,pcs:0};
    byItem[it].amt+=tp; byItem[it].ctn+=x.ctn||0; byItem[it].pcs+=x.pcs||0;
  }
  const dmap=computeDebts();
  let debts=0,debtors=0; for(const v of Object.values(dmap)) if(v>0){debts+=v;debtors++;}
  const avg=sales.length>0?total/sales.length:0;

  let html='<div class="hero">'
    +'<div class="lbl">إجمالي المبيعات — '+PERIODS[selPeriod]+'</div>'
    +'<div class="val">'+fmt(total)+'</div>'
    +'<div class="sub"><span>'+sales.length+' فاتورة</span><span>'+clients.size+' عميل</span><span>متوسط '+fmt(avg)+'</span></div>'
    +'</div>'
    +'<div class="section-title"><div class="dot"></div> ملخص الفترة</div>'
    +'<div class="cards">'
    +card('نقد',fmt(cash),total>0?Math.round(cash/total*100)+'%':'','#059669')
    +card('آجل',fmt(credit),total>0?Math.round(credit/total*100)+'%':'','#DC2626')
    +card('الديون',fmt(debts),debtors+' مدين','#F59E0B')
    +card('الفواتير',sales.length,clients.size+' عميل','#6366F1')
    +card('أعلى فاتورة',fmt(maxSale),'','#2563EB')
    +card('مدفوع نقد',fmt(cash),'','#059669')
    +'</div>';

  const iList=Object.entries(byItem).sort((a,b)=>b[1].amt-a[1].amt).slice(0,6);
  if(iList.length>0){
    html+='<div class="section-title"><div class="dot"></div> أفضل الأصناف</div><div class="tbl-wrap"><table>'
      +'<thead><tr><th>#</th><th>الصنف</th><th>الكمية</th><th>المبلغ</th></tr></thead><tbody>';
    iList.forEach(([name,d],i)=>{
      let q=''; if(d.ctn>0)q+=d.ctn+'ك'; if(d.pcs>0)q+=(q?' ':'')+d.pcs+'ق';
      html+='<tr><td class="t-mut">'+(i+1)+'</td><td class="t-name">'+name+'</td><td class="t-mut">'+(q||'—')+'</td><td class="t-amt">'+fmt(d.amt)+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  const cList=Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(cList.length>0){
    html+='<div class="section-title"><div class="dot"></div> أفضل العملاء</div><div class="tbl-wrap"><table>'
      +'<thead><tr><th>#</th><th>العميل</th><th>المبلغ</th></tr></thead><tbody>';
    cList.forEach(([name,amt],i)=> html+='<tr><td class="t-mut">'+(i+1)+'</td><td class="t-name">'+name+'</td><td class="t-amt">'+fmt(amt)+'</td></tr>');
    html+='</tbody></table></div>';
  }
  return html;
}

function renderStorage(){
  if(allStorage.length===0) return emptyMsg('لا يوجد مخزون');
  const low=allStorage.filter(s=>{const q=(s.shopValue||0)+(s.coolerValue||0); return q>0&&q<=10;});
  let totalShop=0,totalCooler=0;
  allStorage.forEach(s=>{totalShop+=s.shopValue||0; totalCooler+=s.coolerValue||0;});
  let html='';
  if(low.length>0) html+='<div class="warn-box">⚠ '+low.length+' صنف قرب النفاذ</div>';
  html+='<div class="cards" style="margin-bottom:14px">'
    +card('المحل الإجمالي',fmt(totalShop),'','#059669')
    +card('البراد الإجمالي',fmt(totalCooler),'','#2563EB')
    +'</div>';
  const sorted=[...allStorage].filter(s=>(s.shopValue||0)+(s.coolerValue||0)>0)
    .sort((a,b)=>((a.shopValue||0)+(a.coolerValue||0))-((b.shopValue||0)+(b.coolerValue||0)));
  html+='<div class="section-title"><div class="dot"></div> حركة المخزن</div><div class="tbl-wrap"><table>'
    +'<thead><tr><th>الصنف</th><th>الفلاح</th><th>المحل</th><th>البراد</th></tr></thead><tbody>';
  for(const st of sorted){
    const shop=st.shopValue||0,cooler=st.coolerValue||0,q=shop+cooler;
    const col=q<=5?'#DC2626':q<=15?'#F59E0B':'#059669';
    html+='<tr><td class="t-name" style="color:'+col+'">'+(st.itemType||'')+'</td>'
      +'<td class="t-mut">'+(st.farmer||'—')+'</td>'
      +'<td class="t-grn">'+shop.toFixed(1)+'</td>'
      +'<td class="t-blu">'+cooler.toFixed(1)+'</td></tr>';
  }
  html+='</tbody></table></div>';
  return html;
}

function renderSales(){
  const [s,e]=getRange(selPeriod);
  const sales=allSales.filter(x=>inRange(x,s,e)).sort((a,b)=>ts(b)-ts(a));
  if(sales.length===0) return emptyMsg('لا توجد مبيعات في '+PERIODS[selPeriod]);
  let total=0;
  let html='<div class="tbl-wrap"><table>'
    +'<thead><tr><th>الوقت</th><th>الصنف</th><th>الكمية</th><th>العميل</th><th>الدفع</th><th>المبلغ</th></tr></thead><tbody>';
  for(const x of sales){
    const tp=x.totalPrice||0; total+=tp;
    const tm=new Date(ts(x)).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
    const pay=x.paymentType||'—';
    const payCls=pay==='نقد'?'t-grn':(pay==='آجل'?'t-red':'t-mut');
    html+='<tr><td class="t-mut">'+tm+'</td>'
      +'<td class="t-name">'+(x.itemType||'—')+'</td>'
      +'<td class="t-mut">'+qtyLabel(x.ctn,x.pcs,x.piecesPerCarton)+'</td>'
      +'<td class="t-mut">'+(x.clientName||'زبون')+'</td>'
      +'<td class="'+payCls+'">'+pay+'</td>'
      +'<td class="t-amt">'+fmt(tp)+'</td></tr>';
  }
  html+='</tbody></table><div class="tbl-foot"><span class="l">الإجمالي ('+sales.length+')</span><span class="v">'+fmt(total)+'</span></div></div>';
  return html;
}

function renderPurchases(){
  const [s,e]=getRange(selPeriod);
  const items=allPurchases.filter(x=>inRange(x,s,e)).sort((a,b)=>ts(b)-ts(a));
  if(items.length===0) return emptyMsg('لا توجد مشتريات في '+PERIODS[selPeriod]);
  let total=0;
  let html='<div class="tbl-wrap"><table>'
    +'<thead><tr><th>الوقت</th><th>الصنف</th><th>الفلاح</th><th>الكمية</th><th>المبلغ</th></tr></thead><tbody>';
  for(const x of items){
    const tp=x.totalPrice||x.total||x.amount||0; total+=tp;
    const tm=new Date(ts(x)).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
    html+='<tr><td class="t-mut">'+tm+'</td>'
      +'<td class="t-name">'+(x.itemType||'—')+'</td>'
      +'<td class="t-mut">'+(x.farmer||'—')+'</td>'
      +'<td class="t-mut">'+qtyLabel(x.ctn,x.pcs,x.piecesPerCarton)+'</td>'
      +'<td class="t-amt">'+fmt(tp)+'</td></tr>';
  }
  html+='</tbody></table><div class="tbl-foot"><span class="l">الإجمالي ('+items.length+')</span><span class="v">'+fmt(total)+'</span></div></div>';
  return html;
}

function renderJard(){
  const [s,e]=getRange(selPeriod);
  const items=allInvLog.filter(x=>inRange(x,s,e)).sort((a,b)=>ts(b)-ts(a));
  if(items.length===0) return emptyMsg('لا يوجد جرد في '+PERIODS[selPeriod]);
  let html='<div class="tbl-wrap"><table>'
    +'<thead><tr><th>الوقت</th><th>الصنف</th><th>الفلاح</th><th>التفاصيل</th></tr></thead><tbody>';
  for(const x of items){
    const tm=x.time||new Date(ts(x)).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
    const detail=x.detail||'✓ تم التحقق';
    const isDef=detail.indexOf('ناقص')===0;
    const pend=x._pending?'<span class="pend">معلّق</span>':'';
    html+='<tr><td class="t-mut">'+tm+'</td>'
      +'<td class="t-name">'+(x.itemType||'—')+'</td>'
      +'<td class="t-mut">'+(x.farmer||'—')+'</td>'
      +'<td class="'+(isDef?'t-red':'t-grn')+'">'+pend+detail+'</td></tr>';
  }
  html+='</tbody></table></div>';
  return html;
}

function renderTransfer(){
  const [s,e]=getRange(selPeriod);
  const items=allTransfer.filter(x=>inRange(x,s,e)).sort((a,b)=>ts(b)-ts(a));
  if(items.length===0) return emptyMsg('لا يوجد نقل في '+PERIODS[selPeriod]);
  let html='<div class="tbl-wrap"><table>'
    +'<thead><tr><th>الوقت</th><th>الكمية</th><th>من</th><th>إلى</th><th>الصنف</th></tr></thead><tbody>';
  for(const x of items){
    const tm=x.time||new Date(ts(x)).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
    const qty=x.qty||0, ppc=x.ppc||0;
    const qtyStr=ppc>0&&qty>0?(Math.floor(qty/ppc)+(qty%ppc>0?'/'+(qty%ppc):'')):String(Math.round(qty));
    const pend=x._pending?'<span class="pend">معلّق</span>':'';
    html+='<tr><td class="t-mut">'+tm+'</td>'
      +'<td class="t-blu">'+pend+qtyStr+'</td>'
      +'<td class="t-mut">'+(x.from||'—')+'</td>'
      +'<td class="t-mut">'+(x.to||'—')+'</td>'
      +'<td class="t-name">'+(x.itemType||'—')+'</td></tr>';
  }
  html+='</tbody></table></div>';
  return html;
}

function computeDebts(){
  const dmap={};
  for(const x of allSales){
    if(x.paymentType!=='آجل') continue;
    const cn=x.clientName||'زبون'; dmap[cn]=(dmap[cn]||0)+(x.totalPrice||0);
  }
  for(const p of allPayments){
    const cn=p.clientName||''; if(dmap[cn]!==undefined) dmap[cn]-=(p.amount||0);
  }
  return dmap;
}
function renderDebts(){
  const dmap=computeDebts();
  const list=Object.entries(dmap).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(list.length===0) return emptyMsg('لا توجد ديون');
  let total=0; list.forEach(([k,v])=>total+=v);
  let html='<div class="hero" style="background:linear-gradient(135deg,#B45309,#F59E0B)">'
    +'<div class="lbl">إجمالي الديون</div><div class="val">'+fmt(total)+'</div>'
    +'<div class="sub"><span>'+list.length+' مدين</span></div></div>';
  html+='<div class="tbl-wrap"><table>'
    +'<thead><tr><th>#</th><th>العميل</th><th>المبلغ المستحق</th></tr></thead><tbody>';
  list.forEach(([name,amt],i)=> html+='<tr><td class="t-mut">'+(i+1)+'</td><td class="t-name">'+name+'</td><td class="t-red">'+fmt(amt)+'</td></tr>');
  html+='</tbody></table><div class="tbl-foot"><span class="l">الإجمالي</span><span class="v" style="color:#DC2626">'+fmt(total)+'</span></div></div>';
  return html;
}

function card(lbl,val,sub,col){
  return '<div class="card"><div class="stripe" style="background:'+col+'"></div>'
    +'<div class="lbl">'+lbl+'</div><div class="val" style="color:'+col+'">'+val+'</div>'
    +(sub?'<div class="sub" style="color:'+col+'">'+sub+'</div>':'')+'</div>';
}
function emptyMsg(t){ return '<div class="empty">'+t+'</div>'; }

function arr(snap){ return snap.val()?Object.values(snap.val()):[]; }
function loadData(){
  onValue(ref(db,'app_data/sales'),         s=>{allSales=arr(s);     loaded|=1;   render();});
  onValue(ref(db,'app_data/payments'),      s=>{allPayments=arr(s);  loaded|=2;   render();});
  onValue(ref(db,'app_data/storage'),       s=>{allStorage=arr(s);   loaded|=4;   render();});
  onValue(ref(db,'app_data/purchases'),     s=>{allPurchases=arr(s); loaded|=8;   render();});
  onValue(ref(db,'app_data/inventory_log'), s=>{allInvLog=arr(s);    loaded|=16;  render();});
  onValue(ref(db,'app_data/transfer_log'),  s=>{allTransfer=arr(s);  loaded|=32;  render();});
  onValue(ref(db,'app_data/printed_archive'),s=>{allArchive=arr(s);  loaded|=64;  render();});
  document.getElementById('liveDate').textContent='مباشر • '+new Date().toLocaleDateString('ar');
}
loadData();
</script>
